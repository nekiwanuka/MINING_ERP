<article class="panel">
    <div class="panel-header"><h2>{{ title }}</h2></div>
    <div class="table-wrap compact">
        <table>
            <thead><tr><th>Group</th><th>Total</th></tr></thead>
            <tbody>
                {% for row in rows %}
                    <tr><td>{{ row.label }}</td><td>{{ row.total|floatformat:2 }}</td></tr>
                {% empty %}
                    <tr><td colspan="2" class="empty-cell">No report data yet.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</article>
