{% extends 'operations/base.html' %}
{% block title %}{{ title }} | Mining ERP{% endblock %}
{% block content %}
<section class="page-heading form-page-heading">
    <div>
        <p class="eyebrow">Workflow Form</p>
        <h1>{{ title }}</h1>
        {% if subtitle %}<p>{{ subtitle }}</p>{% endif %}
    </div>
</section>

<section class="panel narrow-panel centered-form-panel">
    <form method="post" class="stacked-form" {% if multipart %}enctype="multipart/form-data"{% endif %}>
        {% csrf_token %}
        {% include 'operations/partials/form_fields.html' with form=form %}
        <div class="form-actions">
            <a class="secondary-button" href="{% url cancel_url %}">Cancel</a>
            <button class="primary-button" type="submit">{{ action_label }}</button>
        </div>
    </form>
</section>
{% endblock %}
